# Copy to secret.yaml, fill in real values, and DO NOT commit secret.yaml.
# Apply with:  kubectl apply -f k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: sprint-secret
  namespace: sprint
type: Opaque
stringData:
  # Existing PostgreSQL. Point at your in-cluster or managed DB.
  DATABASE_URL: "postgresql://USER:PASSWORD@postgres-host:5432/sprint?schema=public"
  # openssl rand -base64 32
  AUTH_SECRET: "REPLACE_WITH_RANDOM_SECRET"
  # Google Cloud Console → APIs & Services → Credentials → OAuth 2.0 Client ID
  GOOGLE_CLIENT_ID: "REPLACE.apps.googleusercontent.com"
  GOOGLE_CLIENT_SECRET: "REPLACE"
