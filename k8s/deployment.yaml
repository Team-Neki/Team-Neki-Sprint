apiVersion: apps/v1
kind: Deployment
metadata:
  name: sprint
  namespace: sprint
  labels:
    app: sprint
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sprint
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sprint
    spec:
      # Apply pending migrations before the app starts. Prisma takes an advisory
      # lock, so concurrent pods during a rollout are safe.
      initContainers:
        - name: migrate
          image: ghcr.io/OWNER/sprint:latest # <-- replace with your image
          command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: sprint-secret
      containers:
        - name: sprint
          image: ghcr.io/OWNER/sprint:latest # <-- replace with your image
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: sprint-config
            - secretRef:
                name: sprint-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
