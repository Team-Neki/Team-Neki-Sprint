name: Deploy to Prod (K3s + GitOps)

on:
  # main 머지 시 자동 배포하지 않는다.
  # 배포는 GitHub Actions 탭의 "Run workflow"(workflow_dispatch)로만 수동 트리거한다.
  workflow_dispatch:  # 수동 배포 전용

env:
  # GitOps overlays/prod/sprint-deployment.yaml 의 image 와 일치해야 한다.
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/sprint-prod
  GITOPS_REPO: Team-Neki/Team-Neki-GitOps
  GITOPS_PATH: overlays/prod/sprint-deployment.yaml

jobs:
  build-and-deploy:
    name: Build and Deploy via GitOps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract short SHA
        id: version
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # :latest 와 함께 불변(immutable) :<short-sha> 태그도 push 한다.
      # GitOps 매니페스트는 :<short-sha> 로 bump 되어 ArgoCD 가 변경을 감지한다.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.short_sha }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ============================================================
      # GitOps: GitOps 레포의 이미지 태그 업데이트 → ArgoCD 자동 배포
      # 사전 준비: GitOps 레포에 overlays/prod/sprint-deployment.yaml 이 존재해야 하며
      #            initContainer/컨테이너의 image 라인이 sprint-prod:<tag> 형식이어야 한다.
      # ============================================================
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tag in GitOps repo
        run: |
          cd gitops
          NEW_IMAGE="${{ env.DOCKER_IMAGE }}:${{ steps.version.outputs.short_sha }}"
          echo "Updating image to: $NEW_IMAGE"

          # sprint-deployment.yaml 의 initContainer + 컨테이너 image 두 줄 모두 갱신.
          sed -i "s|image: .*sprint-prod:.*|image: $NEW_IMAGE|g" ${{ env.GITOPS_PATH }}

          echo "Updated image lines:"
          grep "image:" ${{ env.GITOPS_PATH }}

      - name: Commit and push to GitOps repo
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No image change to commit."
            exit 0
          fi

          git add .
          git commit -m "chore(sprint-prod): update image to ${{ steps.version.outputs.short_sha }}

          Triggered by: ${{ github.repository }}@${{ github.sha }}
          Author: ${{ github.actor }}"

          git push
