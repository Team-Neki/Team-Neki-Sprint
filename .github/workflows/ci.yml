name: CI

# 모든 브랜치에 새 커밋이 push 되거나 PR 이 생성/갱신될 때 실행.
on:
  push:
  pull_request:

# 같은 ref 에서 새 커밋이 오면 이전 실행은 취소 (러너 절약).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # postinstall 이 prisma generate 를 실행한다 (Prisma client 생성).
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      # Dockerfile 과 동일한 placeholder 환경변수로 빌드 검증.
      # 실제 값은 런타임에 k8s ConfigMap/Secret 에서 주입된다.
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          AUTH_SECRET: build-placeholder
          AUTH_TRUST_HOST: "true"
          GOOGLE_CLIENT_ID: build
          GOOGLE_CLIENT_SECRET: build
          DATABASE_URL: postgresql://build:build@localhost:5432/build
